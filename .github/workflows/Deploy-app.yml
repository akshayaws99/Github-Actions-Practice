name: Deploy-flask-app

on:
  push:
    branches: [main]

jobs:
    deploy:
      env:
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    
      runs-on: ubuntu-latest
    
      steps:
          - name: checkout the code
            uses: actions/checkout@v4
        
         
          
          - name: deploy with docker compose up
            run: docker compose up -d --build
