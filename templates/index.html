<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Zero To Hero</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#ffffff;

    /* Mr Bean background */
    background-image:
        linear-gradient(rgba(15,12,41,0.75),rgba(48,43,99,0.75)),
        url("https://upload.wikimedia.org/wikipedia/en/2/2c/Mr._Bean_animated_character.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    text-align:center;
    padding:40px;
    max-width:750px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;

    background:linear-gradient(90deg,#00d2ff,#7b2ff7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.badge{
    display:inline-block;
    margin:15px 0 35px;
    padding:6px 18px;

    border:1px solid #7b2ff7;
    border-radius:999px;

    font-size:0.9rem;
    color:#c4b5fd;
    letter-spacing:0.08em;

    backdrop-filter:blur(6px);
}

/* cards */

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;

    padding:25px 30px;
    min-width:170px;

    backdrop-filter:blur(12px);
    transition:all 0.3s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card span{
    display:block;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:#9ca3af;
    margin-bottom:6px;
}

.card strong{
    font-size:1.35rem;
    color:#ffffff;
}

footer{
    margin-top:35px;
    font-size:0.8rem;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

    <h1>DevOps Zero To Hero</h1>

    <div class="badge">
        Josh Batch 10
    </div>

    <div class="cards">

        <div class="card">
            <span>Framework</span>
            <strong>Flask 3.1</strong>
        </div>

        <div class="card">
            <span>Runtime</span>
            <strong>Python 3.14</strong>
        </div>

        <div class="card">
            <span>Deploy</span>
            <strong>AWS ECS</strong>
        </div>

    </div>

    <footer>
        DevOps Learning Journey 🚀
    </footer>

</div>

</body>
</html>
